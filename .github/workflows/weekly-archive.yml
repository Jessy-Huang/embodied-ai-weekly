name: Weekly Archive and Deploy

on:
  schedule:
    # 每周一早上 8 点触发 (UTC 时间 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch: # 支持手动触发

jobs:
  archive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "week=$(date +%Y-W%W)" >> $GITHUB_OUTPUT
      
      - name: Archive current latest
        run: |
          # 检查 latest/index.html 是否存在
          if [ -f "latest/index.html" ]; then
            # 复制到 archive 目录，按日期命名
            cp "latest/index.html" "archive/${{ steps.date.outputs.date }}.html"
            echo "Archived to archive/${{ steps.date.outputs.date }}.html"
          else
            echo "No latest/index.html found, skipping archive"
          fi
      
      - name: Update archive index
        run: |
          # 生成归档索引页面
          cat > archive/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>具身智能周报 - 归档</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
                min-height: 100vh;
                color: #fff;
                padding: 40px 20px;
              }
              .container {
                max-width: 800px;
                margin: 0 auto;
              }
              h1 {
                text-align: center;
                margin-bottom: 40px;
                font-size: 2.5rem;
                background: linear-gradient(90deg, #00d4ff, #7b2cbf);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
              }
              .latest-link {
                display: block;
                text-align: center;
                padding: 20px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                border-radius: 12px;
                color: #fff;
                text-decoration: none;
                font-size: 1.2rem;
                margin-bottom: 40px;
                transition: transform 0.3s, box-shadow 0.3s;
              }
              .latest-link:hover {
                transform: translateY(-3px);
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
              }
              .archive-list {
                background: rgba(255,255,255,0.05);
                border-radius: 16px;
                padding: 30px;
                backdrop-filter: blur(10px);
              }
              .archive-list h2 {
                margin-bottom: 20px;
                font-size: 1.5rem;
              }
              .archive-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 15px 0;
                border-bottom: 1px solid rgba(255,255,255,0.1);
              }
              .archive-item:last-child {
                border-bottom: none;
              }
              .archive-date {
                color: #a0a0a0;
              }
              .archive-link {
                color: #00d4ff;
                text-decoration: none;
                padding: 8px 16px;
                border: 1px solid #00d4ff;
                border-radius: 6px;
                transition: all 0.3s;
              }
              .archive-link:hover {
                background: #00d4ff;
                color: #1a1a2e;
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>📊 具身智能周报归档</h1>
              <a href="../latest/" class="latest-link">查看最新周报 →</a>
              <div class="archive-list">
                <h2>历史归档</h2>
          EOF
          
          # 列出所有归档文件（按时间倒序）
          for file in $(ls -1 archive/*.html 2>/dev/null | grep -v "index.html" | sort -r); do
            filename=$(basename "$file")
            date_str=$(echo "$filename" | sed 's/.html$//')
            echo "        <div class=\"archive-item\">" >> archive/index.html
            echo "          <span class=\"archive-date\">📅 $date_str</span>" >> archive/index.html
            echo "          <a href=\"$filename\" class=\"archive-link\">查看详情</a>" >> archive/index.html
            echo "        </div>" >> archive/index.html
          done
          
          cat >> archive/index.html << 'EOF'
              </div>
            </div>
          </body>
          </html>
          EOF
      
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add archive/
          git diff --staged --quiet || git commit -m "Weekly archive: ${{ steps.date.outputs.date }}"
          git push

  deploy:
    needs: archive
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
